services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CLOUDOPS_ENVIRONMENT: local
      CLOUDOPS_CLOUD_PROVIDER: aws
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 3

